<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>זמינות אכסניות אנ"א — יולי–אוגוסט 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #21262d;
    --text:      #e6edf3;
    --muted:     #7d8590;
    --avail-lo:  #1a7a4a;
    --avail-hi:  #2ea043;
    --avail-glo: #39d353;
    --unavail:   #1c2128;
    --gold:      #d4a017;
    --teal:      #0ea5e9;
    --header-h:  72px;
    --col-w:     110px;
    --row-h:     50px;
    --date-col:  90px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
    padding: 28px 32px 24px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(14,165,233,.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-inner { max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }
  .logo {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 6px;
  }
  h1 {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 900;
    color: #fff;
    line-height: 1.15;
  }
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 300;
  }
  .subtitle strong { color: var(--gold); font-weight: 700; }

  /* ── Stats bar ── */
  .stats {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,.08);
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-val {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--avail-glo);
    line-height: 1;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    max-width: 100%;
    overflow-x: auto;
  }
  .tab {
    padding: 14px 22px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    white-space: nowrap;
    user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--teal); border-bottom-color: var(--teal); }

  /* ── Main content ── */
  .main { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 20px;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
  .legend-dot {
    width: 14px; height: 14px; border-radius: 3px;
  }
  .legend-avail { background: var(--avail-hi); }
  .legend-unavail { background: var(--unavail); border: 1px solid var(--border); }
  .legend-cheap { background: linear-gradient(135deg, #166534, #16a34a); }
  .legend-exp { background: linear-gradient(135deg, #1a4a7a, #2563eb); }

  /* ── GRID VIEW ── */
  #view-grid { display: block; }
  #view-cards { display: none; }
  #view-dates { display: none; }

  .grid-wrap {
    overflow-x: auto;
    overflow-y: auto;
    max-height: calc(100vh - 260px);
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
  }
  .grid {
    display: grid;
    min-width: max-content;
  }
  .grid-header {
    display: contents;
  }
  .grid-header-cell {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #1c2333;
    border-bottom: 2px solid var(--border);
    padding: 10px 6px 8px;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    min-width: var(--col-w);
  }
  .grid-header-cell:first-child {
    position: sticky;
    left: 0;
    z-index: 20;
    min-width: var(--date-col);
    text-align: right;
    padding-right: 12px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .grid-row {
    display: contents;
  }
  .grid-row:hover .grid-cell { filter: brightness(1.12); }

  .grid-date {
    position: sticky;
    left: 0;
    z-index: 5;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: var(--row-h);
    min-width: var(--date-col);
    border-left: 3px solid transparent;
  }
  .grid-date.month-jul { border-left-color: var(--teal); }
  .grid-date.month-aug { border-left-color: var(--gold); }
  .date-day {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .date-num {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .date-month { font-size: 9px; color: var(--muted); }

  .grid-cell {
    border-bottom: 1px solid rgba(33,38,45,.6);
    border-right: 1px solid rgba(33,38,45,.4);
    height: var(--row-h);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    cursor: default;
    transition: transform .1s;
    position: relative;
    min-width: var(--col-w);
  }
  .grid-cell:hover { transform: scale(1.04); z-index: 3; }
  .grid-cell.avail {
    color: #fff;
  }
  .grid-cell.unavail {
    background: var(--unavail);
    color: var(--border);
  }

  /* Price-based color gradient */
  .price-tier-1 { background: linear-gradient(135deg, #14532d, #166534); }
  .price-tier-2 { background: linear-gradient(135deg, #15803d, #16a34a); }
  .price-tier-3 { background: linear-gradient(135deg, #0369a1, #0284c7); }
  .price-tier-4 { background: linear-gradient(135deg, #1d4ed8, #2563eb); }
  .price-tier-5 { background: linear-gradient(135deg, #7c3aed, #6d28d9); }

  .cell-price { font-size: 13px; font-weight: 700; }
  .cell-sym { font-size: 9px; opacity: .8; margin-left: 1px; }

  /* Tooltip */
  .grid-cell.avail:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #0d1117;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 11px;
    font-weight: 400;
    padding: 6px 10px;
    border-radius: 6px;
    white-space: pre;
    z-index: 100;
    pointer-events: none;
    line-height: 1.6;
    min-width: 120px;
    text-align: center;
  }

  /* Month separator row */
  .month-sep {
    display: contents;
  }
  .month-label-cell {
    height: 28px;
    background: rgba(14,165,233,.07);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--teal);
    display: flex;
    align-items: center;
    padding-right: 12px;
    position: sticky;
    left: 0;
    z-index: 5;
  }
  .month-sep-filler {
    height: 28px;
    background: rgba(14,165,233,.04);
    border-bottom: 1px solid rgba(14,165,233,.12);
  }

  /* ── CARDS VIEW ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,.4);
  }
  .card-head {
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .card-name {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.25;
  }
  .card-count {
    background: var(--avail-lo);
    color: var(--avail-glo);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-count.zero {
    background: rgba(125,133,144,.15);
    color: var(--muted);
  }
  .card-body { padding: 14px 18px 16px; }
  .card-price {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--avail-glo);
    margin-bottom: 10px;
  }
  .card-price span { font-size: 13px; font-weight: 400; color: var(--muted); }
  .card-dates {
    font-size: 12px;
    color: var(--muted);
    line-height: 2;
  }
  .date-chip {
    display: inline-block;
    background: rgba(46,160,67,.15);
    border: 1px solid rgba(46,160,67,.3);
    color: var(--avail-glo);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 11px;
    font-weight: 500;
    margin: 2px 3px 2px 0;
    direction: ltr;
  }
  .card-booked {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 80px;
    color: var(--muted);
    font-size: 13px;
    gap: 8px;
  }

  /* ── BY DATE VIEW ── */
  .date-section { margin-bottom: 24px; }
  .date-section-head {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .date-big {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
    direction: ltr;
  }
  .date-meta { font-size: 12px; color: var(--muted); }
  .date-avail-count {
    margin-right: auto;
    background: var(--avail-lo);
    color: var(--avail-glo);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .date-avail-count.few { background: rgba(212,160,23,.15); color: var(--gold); }
  .date-avail-count.none { background: rgba(125,133,144,.1); color: var(--muted); }
  .hostel-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .hostel-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hostel-pill.avail { border-color: rgba(46,160,67,.4); background: rgba(46,160,67,.08); }
  .pill-name { font-weight: 600; color: var(--text); }
  .pill-price { font-weight: 700; color: var(--avail-glo); font-family: 'Frank Ruhl Libre', serif; font-size: 14px; }
  .pill-min { font-size: 10px; color: var(--muted); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    :root { --col-w: 88px; --row-h: 46px; }
    header { padding: 18px 16px; }
    h1 { font-size: 22px; }
    .stats { gap: 16px; }
    .stat-val { font-size: 22px; }
  }

  .fade-in {
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp .4s ease forwards;
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in:nth-child(1) { animation-delay: .05s; }
  .fade-in:nth-child(2) { animation-delay: .1s; }
  .fade-in:nth-child(3) { animation-delay: .15s; }
</style>
</head>

<header>
  <div class="header-inner">
    <div class="logo">Israel Youth Hostel Association · ANA Hostels</div>
    <h1>זמינות אכסניות אנ"א<br><span style="color:var(--teal)">יולי–אוגוסט 2026</span></h1>
    <div class="subtitle">

    <div class="stats" id="stats-bar"></div>

    <div class="legend-item"><div class="legend-dot legend-unavail"></div> לא פנוי</div>

  <!-- GRID VIEW -->
  <div id="view-grid">
    <div class="grid-wrap">
      <div class="grid" id="main-grid"></div>
    </div>
  </div>

  <!-- CARDS VIEW -->
  <div id="view-cards">
    <div class="cards-grid" id="cards-container"></div>
  </div>

  <!-- DATES VIEW -->
  <div id="view-dates">
    <div id="dates-container"></div>
  </div>
</div>

const DAYS_HE = ['ראשון','שני','שלישי','רביעי','חמישי'];
const MONTHS_HE = {7:'יולי', 8:'אוגוסט'};

function priceTier(p) {
  if (!p || p === 0) return 'price-tier-2';
  if (p <= 500) return 'price-tier-1';
  if (p <= 650) return 'price-tier-2';
  if (p <= 750) return 'price-tier-3';
  if (p <= 900) return 'price-tier-4';
  return 'price-tier-5';
}

function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function dayName(s) {
  return DAYS_HE[parseDate(s).getDay()];
}
function monthNum(s) { return parseInt(s.split('-')[1]); }
function dayNum(s) { return parseInt(s.split('-')[2]); }

// ── Build Grid ──
function buildGrid() {
  const grid = document.getElementById('main-grid');
  const hostels = DATA.hostels;
  const dates = DATA.dates;
  const cols = hostels.length + 1;

  grid.style.gridTemplateColumns = `var(--date-col) repeat(${hostels.length}, var(--col-w))`;

  // Header row
  const hdrCorner = document.createElement('div');
  hdrCorner.className = 'grid-header-cell';
  hdrCorner.textContent = 'תאריך';
  grid.appendChild(hdrCorner);

  hostels.forEach(h => {
    const cell = document.createElement('div');
    cell.className = 'grid-header-cell';
    // Short name: remove אנ"א prefix
    const short = h.replace('אנ"א ', '');
    cell.textContent = short;
    cell.title = h;
    grid.appendChild(cell);
  });

  // Month separator state
  let lastMonth = null;

  dates.forEach(dateStr => {
    const m = monthNum(dateStr);
    if (m !== lastMonth) {
      // Month label row
      const label = document.createElement('div');
      label.className = 'month-label-cell';
      label.textContent = MONTHS_HE[m];
      label.style.cssText = 'position:sticky;left:0;z-index:5;';
      grid.appendChild(label);
      for (let i = 0; i < hostels.length; i++) {
        const f = document.createElement('div');
        f.className = 'month-sep-filler';
        grid.appendChild(f);
      }
      lastMonth = m;
    }

    // Date cell
    const dateCell = document.createElement('div');
    dateCell.className = `grid-date month-${m === 7 ? 'jul' : 'aug'}`;
    dateCell.innerHTML = `<span class="date-day">${dayName(dateStr)}'</span><span class="date-num">${dayNum(dateStr)}</span><span class="date-month">${MONTHS_HE[m]}</span>`;
    grid.appendChild(dateCell);

    // Hostel cells
    hostels.forEach(h => {
      const entry = DATA.data[h]?.[dateStr];
      const cell = document.createElement('div');
      if (entry) {
        const p = entry.price || 0;
        cell.className = `grid-cell avail ${priceTier(p)}`;
        cell.innerHTML = p > 0
          ? `<span class="cell-sym">₪</span><span class="cell-price">${p}</span>`
          : `<span class="cell-price" style="font-size:10px;opacity:.7">פנוי</span>`;
        const minStr = entry.min > 1 ? `מינ' ${entry.min} לילות` : 'מינ' + "' לילה";
        cell.setAttribute('data-tip', `${h}\n${dateStr}\n₪${p} ∙ ${entry.rooms} חדרים\n${minStr}`);
      } else {
        cell.className = 'grid-cell unavail';
        cell.textContent = '–';
      }
      grid.appendChild(cell);
    });
  });
}

// ── Build Cards ──
function buildCards() {
  const container = document.getElementById('cards-container');
  DATA.hostels.forEach(h => {
    const dates = DATA.data[h] || {};
    const availDates = Object.entries(dates).sort((a,b) => a[0].localeCompare(b[0]));
    const card = document.createElement('div');
    card.className = 'card fade-in';

    if (!availDates.length) {
      card.innerHTML = `
        <div class="card-head">
          <div class="card-name">${h.replace('אנ"א ','')}</div>
          <div class="card-count zero">סגור</div>
        </div>
        <div class="card-body"><div class="card-booked">🔒 מלא לחלוטין</div></div>`;
      container.appendChild(card);
      return;
    }

    const prices = availDates.map(([,v]) => v.price).filter(p => p > 0);
    const minP = prices.length ? Math.min(...prices) : 0;
    const maxP = prices.length ? Math.max(...prices) : 0;

    // Group consecutive dates
    const chips = availDates.map(([d]) => {
      const dt = parseDate(d);
      return `<span class="date-chip">${dayNum(d)}/${monthNum(d)}</span>`;
    }).join('');

    card.innerHTML = `
      <div class="card-head">
        <div class="card-name">${h.replace('אנ"א ','')}</div>
        <div class="card-count">${availDates.length} תאריכים</div>
      </div>
      <div class="card-body">
        <div class="card-price">₪${minP}${maxP !== minP ? `<span>–₪${maxP}</span>` : ''} <span>ללילה</span></div>
        <div class="card-dates">${chips}</div>
      </div>`;
    container.appendChild(card);
  });
}

function buildByDate() {

  DATA.dates.forEach(dateStr => {
    const section = document.createElement('div');
    section.className = 'date-section fade-in';

    const available = DATA.hostels.filter(h => DATA.data[h]?.[dateStr]);
    const countClass = available.length === 0 ? 'none' : available.length <= 3 ? 'few' : '';

    const head = document.createElement('div');
    head.className = 'date-section-head';
    head.innerHTML = `
      <div>
        <div class="date-big">${dayNum(dateStr)}/${monthNum(dateStr)}</div>
        <div class="date-meta">${dayName(dateStr)}', ${MONTHS_HE[monthNum(dateStr)]} ${dateStr.split('-')[0]}</div>
      </div>
      <div class="date-avail-count ${countClass}">${available.length ? available.length + ' אכסניות' : 'אין זמינות'}</div>`;

    const pills = document.createElement('div');
    pills.className = 'hostel-pills';

    available.forEach(h => {
      const entry = DATA.data[h][dateStr];
      const pill = document.createElement('div');
      pill.className = 'hostel-pill avail';
      const minStr = entry.min > 1 ? `מינ' ${entry.min} לילות` : '';
      pill.innerHTML = `
        <span class="pill-name">${h.replace('אנ"א ','')}</span>
        <span class="pill-price">₪${entry.price || '?'}</span>
        ${minStr ? `<span class="pill-min">${minStr}</span>` : ''}`;
      pills.appendChild(pill);
    });

    if (!available.length) {
      const none = document.createElement('div');
      none.style.cssText = 'color:var(--muted);font-size:13px;padding:8px 0;';
      none.textContent = 'אין מקומות פנויים ביום זה';
      pills.appendChild(none);
    }

    section.appendChild(head);
    section.appendChild(pills);
    container.appendChild(section);
  });
}

// ── Stats ──
function buildStats() {
  let totalSlots = 0, minP = Infinity, maxP = 0, availHostels = 0;
  DATA.hostels.forEach(h => {
    const entries = Object.values(DATA.data[h] || {});
    if (entries.length) availHostels++;
    entries.forEach(e => {
      totalSlots++;
      if (e.price > 0) { minP = Math.min(minP, e.price); maxP = Math.max(maxP, e.price); }
    });
  });
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = `
    <div class="stat"><div class="stat-val">${availHostels}</div><div class="stat-label">אכסניות פנויות</div></div>
    <div class="stat"><div class="stat-val">${totalSlots}</div><div class="stat-label">תאריך-אכסניה פנוי</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--gold)">₪${minP}</div><div class="stat-label">מחיר מינימום</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--teal)">${DATA.dates.length}</div><div class="stat-label">ימים בטווח</div></div>
  `;
}

// ── Tab switch ──
function switchTab(view, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-grid').style.display = view === 'grid' ? 'block' : 'none';
  document.getElementById('view-cards').style.display = view === 'cards' ? 'block' : 'none';
  document.getElementById('view-dates').style.display = view === 'dates' ? 'block' : 'none';
}

// ── Init ──
buildStats();
buildGrid();
buildCards();
buildByDate();
</script>
</body>
</html>
